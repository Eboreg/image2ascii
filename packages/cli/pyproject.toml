[project]
name = "image2ascii-cli"
version = "0.4.3"
description = "Adds `i2a` CLI command to `image2ascii-core`."
readme = "README.md"
authors = [
    { name = "Robert Huselius", email = "robert@huseli.us" }
]
requires-python = ">=3.13"
dependencies = [
    "image2ascii",
    "pydantic-settings[yaml]>=2.13.1",
]
license = "GPL-3.0-only"
license-files = ["LICENSE"]

[project.entry-points.i2a_plugins]
cli = "image2ascii_cli"

[project.scripts]
i2a = "image2ascii_cli:cli"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
image2ascii = { workspace = true }
